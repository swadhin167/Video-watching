<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDisk - Watch Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://pl29406457.profitablecpmratenetwork.com/9f/25/b5/9f25b5af4e3ba7862e358ba1bb7f3d99.js"></script>

    <style>
        .ad-slot { background: #1e293b; border: 1px dashed #475569; display: flex; align-items: center; justify-content: center; min-height: 100px; margin: 15px 0; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; border-radius: 1rem; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="max-w-4xl mx-auto p-6">
        <header class="text-center py-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">
                STREAM DISK
            </h1>
            <p class="text-gray-400 mt-2">Paste link and watch instantly</p>
        </header>

        <div class="ad-slot">
            <p class="text-gray-500 text-xs">ADVERTISEMENT (Top)</p>
        </div>

        <div id="inputArea" class="bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
            <div class="flex flex-col gap-4">
                <input type="text" id="videoLink" placeholder="Paste Video Link Here..." 
                    class="w-full p-4 bg-slate-900 border border-slate-600 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-white">
                
                <button onclick="startStreaming()" class="w-full bg-gradient-to-r from-orange-500 to-red-600 p-4 rounded-xl font-bold text-lg hover:scale-[1.02] transition-transform">
                    <i class="fas fa-play-circle mr-2"></i> WATCH VIDEO NOW
                </button>
            </div>
        </div>

        <div id="midAd" class="ad-slot">
            <p class="text-gray-500 text-xs">ADVERTISEMENT (Middle)</p>
        </div>

        <div id="playerSection" class="hidden mt-6 space-y-6">
            <div class="video-container shadow-2xl border-2 border-orange-500/50">
                <iframe id="mainPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>

            <div class="flex flex-wrap gap-4 justify-center">
                <button onclick="location.reload()" class="bg-slate-700 px-6 py-3 rounded-full font-semibold hover:bg-slate-600">
                    <i class="fas fa-redo mr-2"></i> Watch Another
                </button>
            </div>
        </div>
    </div>

    <script>
        function startStreaming() {
            const rawLink = document.getElementById('videoLink').value.trim();
            if(!rawLink) { 
                alert("Please enter a link!");
                return; 
            }

            let finalLink = rawLink;
            if (rawLink.includes("youtube.com/watch?v=")) {
                finalLink = rawLink.replace("watch?v=", "embed/");
            } else if (rawLink.includes("youtu.be/")) {
                let id = rawLink.split("/").pop();
                finalLink = "https://www.youtube.com/embed/" + id;
            }

            document.getElementById('inputArea').classList.add('hidden');
            document.getElementById('playerSection').classList.remove('hidden');
            document.getElementById('mainPlayer').src = finalLink;
        }
    </script>
</body>
</html>
